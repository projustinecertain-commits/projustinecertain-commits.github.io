// ── HELPERS ──────────────────────────────────────────────────────────────────
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function getWeekDays(offset=0){
  const now=new Date(),mon=new Date(now);
  mon.setDate(now.getDate()-((now.getDay()+6)%7)+offset*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function dKey(d){
  if(!(d instanceof Date))return d;
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function todayK(){
  const now=new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
}
function fmtDate(d){return `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;}
function getWeekLabel(offset,days){
  if(offset===0)return "Cette semaine";
  const mon=days[0];
  const mois=MONTHS_SHORT[mon.getMonth()];
  const semNum=Math.ceil(mon.getDate()/7);
  return `${mois} Sem.${semNum}`;
}
function payIcon(p){return {"Espèces":"💵","Virement":"🏦","PayPal":"🅿️","Carte 6 plongées":"🃏","Carte 8 plongées":"🃏","Carte 10 plongées":"🃏"}[p]||"💳";}
function isCard(p){return p&&p.startsWith("Carte");}
function cardTotal(p){return p==="Carte 6 plongées"?6:p==="Carte 8 plongées"?8:p==="Carte 10 plongées"?10:0;}
function lastDiveIcon(ds){
  if(!ds)return "⚪";
  const m=Math.floor((new Date()-new Date(ds))/(1000*60*60*24*30));
  if(m>12)return "🔴";
  if(m>6)return "🟡";

}

}

// ── DATA HELPERS ──────────────────────────────────────────────────────────────
function getSlot(day,sid,planning){
  const def=DIVE_SLOTS.find(s=>s.id===sid);
  return planning[dKey(day)]?.[sid]||{site:DIVE_SITES[0],monitor:MONITORS[0],divers:[],proGroups:[],extraMonitors:{},time:def?.defaultTime||"07:00",dp:"Patrick",annule:false,raisonAnnulation:"",params:{...EMPTY_SLOT_PARAMS}};
}

function countBottles(day,sid,planning){
  const s=getSlot(day,sid,planning);
  if(!s.divers.length&&!(s.proGroups||[]).length)return 0;
  const em=s.extraMonitors||{};
  const monBlocs=MONITORS.reduce((t,mon)=>{
    if(!s.divers.filter(d=>d.moniteur===mon).length)return t;
    return t+1+(em[mon]?1:0);
  },0);
  const proBlocs=(s.proGroups||[]).reduce((t,pg)=>t+(pg.plongeur1?1:0)+(pg.plongeur2?1:0),0);
  return s.divers.length+monBlocs+proBlocs;
}

  const [showDiverProfile,setShowDiverProfile]=useState(null);

  const [editProId,setEditProId]=useState(null);
  const [form,setForm]=useState({...EMPTY_DIVER});
  const [proForm,setProForm]=useState({...EMPTY_PRO});
  const [cfg,setCfg]=useState({site:DIVE_SITES[0],monitor:MONITORS[0],time:"07:00",dp:"Patrick"});
  const [syncing,setSyncing]=useState(false);
  const [lastSync,setLastSync]=useState(null);
  const [diversDB,setDiversDB]=useState([]);
  const [diversSearch,setDiversSearch]=useState("");
  const [showParamsSlot,setShowParamsSlot]=useState(null);
  const [paramsLocal,setParamsLocal]=useState({...EMPTY_SLOT_PARAMS});

  const days=getWeekDays(weekOffset);
  const tdk=todayK();
  const weekLabel=getWeekLabel(weekOffset,days);

  useEffect(()=>{
    setSyncing(true);
    const unsub=db.collection("planning").doc("data").onSnapshot(snap=>{
      if(snap.exists)setPlanning(snap.data().planning||{});
      setLastSync(new Date());setSyncing(false);
    },()=>setSyncing(false));
    return()=>unsub();
  },[]);

  useEffect(()=>{
    const unsub=db.collection("divers").onSnapshot(snap=>{
      const list=snap.docs.map(d=>({id:d.id,...d.data()}));
      list.sort((a,b)=>(a.nom+a.prenom).localeCompare(b.nom+b.prenom));
      setDiversDB(list);
    });
    return()=>unsub();
  },[]);

  const save=async(p)=>{
    setSyncing(true);
    try{await db.collection("planning").doc("data").set({planning:p,updatedAt:new Date().toISOString()});}
    catch(e){console.error(e);}
    setSyncing(false);
  };

  const gSlot=(day,sid)=>getSlot(day,sid,planning);

  const updateSlot=async(day,sid,data)=>{
    const dk=dKey(day);
    const p={...planning,[dk]:{...(planning[dk]||{}),[sid]:data}};
    setPlanning(p);await save(p);
  };

  const openCfg=(day,sid)=>{
    const s=gSlot(day,sid);const def=DIVE_SLOTS.find(sl=>sl.id===sid);
    setSelDay(day);setSelSlot(sid);
    setCfg({site:s.site||DIVE_SITES[0],monitor:s.monitor||MONITORS[0],time:s.time||def?.defaultTime,dp:s.dp||"Patrick"});
    setShowCfg(true);
  };
  const saveCfg=async()=>{const s=gSlot(selDay,selSlot);await updateSlot(selDay,selSlot,{...s,...cfg});setShowCfg(false);};

  const openAdd=(day,sid,moniteur)=>{
    const slot=gSlot(day,sid);
    if(slot.divers.filter(d=>d.moniteur===moniteur).length>=MAX_PER_MONITOR)return;
    setSelDay(day);setSelSlot(sid);setEditId(null);setForm({...EMPTY_DIVER,moniteur});setShowForm(true);
  };
  const openEdit=(day,sid,diver)=>{setSelDay(day);setSelSlot(sid);setEditId(diver.id);setForm({...EMPTY_DIVER,...diver});setShowForm(true);};

  const saveDiver=async()=>{
    if(!form.nom.trim()||!form.prenom.trim())return;
    const slot=gSlot(selDay,selSlot);
    const nd=editId?slot.divers.map(d=>d.id===editId?{...form,id:editId}:d):[...slot.divers,{...form,id:genId()}];
    let newPlanning={...planning};
    const dk=dKey(selDay);
    newPlanning[dk]={...(newPlanning[dk]||{}),[selSlot]:{...slot,divers:nd}};
    // Auto-copy double to matin2
    if(selSlot==="matin1"&&form.prestation&&form.prestation.toLowerCase().startsWith("double")){
      const m2=gSlot(selDay,"matin2");
      if(!m2.divers.some(d=>d.nom===form.nom&&d.prenom===form.prenom)&&m2.divers.length<MAX_DIVERS){
        const d2={...form,id:genId(),montantPaye:"",montantNet:"",notePaiement:"",prestation:"Exploration — Certifié"};
        newPlanning[dk]["matin2"]={...m2,divers:[...m2.divers,d2]};
      }
    }
    // Sync to future slots
    if(editId){
      Object.keys(newPlanning).forEach(dateStr=>{
        if(dateStr<dKey(selDay))return;
        Object.keys(newPlanning[dateStr]).forEach(sid=>{
          if(dateStr===dKey(selDay)&&sid===selSlot)return;
          const slotDivers=newPlanning[dateStr][sid]?.divers||[];
          const idx=slotDivers.findIndex(d=>d.nom===form.nom&&d.prenom===form.prenom);
          if(idx>=0){
            newPlanning[dateStr][sid].divers[idx]={...slotDivers[idx],certification:form.certification,stab:form.stab,combi:form.combi,palmes:form.palmes,masquePerso:form.masquePerso,palmePerso:form.palmePerso,combiPerso:form.combiPerso,stabPerso:form.stabPerso,residence:form.residence,vehicule:form.vehicule,rdvPoint:form.rdvPoint,contactSource:form.contactSource,note:form.note};
          }
        });
      });
    }
    setPlanning(newPlanning);
    await db.collection("planning").doc("data").set({planning:newPlanning,updatedAt:new Date().toISOString()});
    setSyncing(false);
    // Save to divers DB
    const diverKey=(form.prenom.trim()+"-"+form.nom.trim()).toLowerCase().replace(/[^a-z0-9-]/g,"_");
    try{
      const ex=await db.collection("divers").doc(diverKey).get();
      const hist=ex.exists?(ex.data().historyDates||[]):[];
      const todayStr=dKey(selDay);
      if(!hist.includes(todayStr))hist.push(todayStr);
      await db.collection("divers").doc(diverKey).set({nom:form.nom,prenom:form.prenom,certification:form.certification,nbPlongees:form.nbPlongees,dernierePlongee:form.dernierePlongee,stab:form.stab,combi:form.combi,palmes:form.palmes,masquePerso:form.masquePerso,palmePerso:form.palmePerso,combiPerso:form.combiPerso,stabPerso:form.stabPerso,residence:form.residence,vehicule:form.vehicule,rdvPoint:form.rdvPoint,contactSource:form.contactSource,paiement:form.paiement,note:form.note,updatedAt:new Date().toISOString(),historyDates:hist.sort().slice(-50)},{merge:true});
    }catch(ex){console.error(ex);}
    setShowForm(false);
  };

  const delDiver=async(day,sid,did)=>{const slot=gSlot(day,sid);await updateSlot(day,sid,{...slot,divers:slot.divers.filter(d=>d.id!==did)});};

  };

    return t+s.divers.reduce((a,dv)=>a+(Number(dv.montantPaye)||0),0)+(s.proGroups||[]).reduce((a,pg)=>a+(Number(pg.montant)||0),0);
