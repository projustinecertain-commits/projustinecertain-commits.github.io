  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f5ead8;font-family:'Outfit',sans-serif;color:#1a2a3a;max-width:480px;margin:0 auto;min-height:100vh;font-size:17px}
    ::-webkit-scrollbar{display:none}
    input,select{outline:none;-webkit-appearance:none;font-size:16px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .fu{animation:fadeUp .28s cubic-bezier(.22,.68,0,1.2)}
    .card{background:rgba(255,255,255,.85);border:1px solid rgba(0,120,180,.15);border-radius:18px;box-shadow:0 2px 8px rgba(0,80,120,.08)}
    .btn-c{background:linear-gradient(135deg,#0088bb,#006699);color:#fff;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-weight:700;cursor:pointer;font-size:16px}
    .btn-g{background:rgba(255,255,255,.78);color:#1a5a7a;border:1.5px solid rgba(0,120,180,.2);border-radius:10px;font-family:'Outfit',sans-serif;font-weight:600;cursor:pointer;font-size:14px}
    .inp{width:100%;background:rgba(255,255,255,.88);border:1.5px solid rgba(0,120,180,.22);border-radius:12px;padding:13px 15px;color:#1a2a3a;font-family:'Outfit',sans-serif;font-size:16px}
    .inp::placeholder{color:#9ab5c0}
    select.inp option{background:#fdf6ec;color:#1a2a3a}
    .sl{font-size:11px;color:#5a8a9a;font-weight:700;text-transform:uppercase;letter-spacing:2px;font-family:'Space Mono',monospace;margin-bottom:7px}
    .dr{display:flex;align-items:center;padding:12px 13px;background:rgba(255,255,255,.78);border:1.5px solid rgba(0,120,180,.1);border-radius:14px;gap:11px;cursor:pointer;box-shadow:0 1px 4px rgba(0,80,120,.05)}
    .tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;font-family:'Space Mono',monospace}
    .chk{width:22px;height:22px;border-radius:6px;border:2px solid rgba(0,150,200,.3);background:rgba(255,255,255,.88);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    @media print{body{background:#fff!important;max-width:100%!important}.no-print{display:none!important}}
  </style>
</head>
<body>
<div id="root"></div>
<script>
  const LOGO_SRC="https://divensmilebora.com/wp-content/uploads/2025/08/logo.jpg";
  const firebaseConfig={apiKey:"AIzaSyAkwx0vdnHXt0V7S5au4nVLudwVEmC_8_M",authDomain:"dive-n-smile.firebaseapp.com",projectId:"dive-n-smile",storageBucket:"dive-n-smile.firebasestorage.app",messagingSenderId:"663554708006",appId:"1:663554708006:web:9dfdcda13d1f4fecd5cce7"};
  firebase.initializeApp(firebaseConfig);
  const db=firebase.firestore();
</script>
<script type="text/babel">
const {useState,useEffect}=React;

const PRESTATIONS=[
  {cat:"🤿 Exploration",items:[
    {label:"Exploration — Certifié",prix:10000},
    {label:"Exploration — Non-certifié",prix:11000},
    {label:"Double exploration — Certifié",prix:19000},
    {label:"Double exploration — Non-certifié",prix:21000},
    {label:"Baptême de plongée",prix:11000},
    {label:"Plongée sur-mesure (sunset/nuit...)",prix:12000},
  ]},
  {cat:"🎓 Formation ANMP",items:[
    {label:"Niveau 1 ANMP (4 séances)",prix:44000},
    {label:"Niveau 2 ANMP (8 séances)",prix:88000},
    {label:"Niveau 3 ANMP (10 séances)",prix:110000},
    {label:"Séance supplémentaire",prix:11000},
  ]},
  {cat:"🌊 Snorkeling & Accompagnant",items:[
    {label:"Sortie Snorkeling",prix:5000},
    {label:"Accompagnant (gratuit)",prix:0},
  ]},
  {cat:"🚤 Sur-mesure / Bateau privé",items:[
    {label:"Bateau privé — 1 plongée",prix:60000},
    {label:"Bateau privé — 2 plongées",prix:100000},
    {label:"Bateau privé — 3 plongées",prix:150000},
  ]},
];

const DIVE_SITES=["Anau","Toopua","Tapu Nui","Tapu Canyon","Haapiti","Mûri Mûri","Tupitipiti"];
const CERTIFICATIONS=["Baptême","Niveau 1 (PE-12m)","Niveau 2 (PE-20m)","Niveau 3 (PE-40m)","Niveau 4 (PE-60m)","Niveau 5 – Guide","Open Water","Advanced Open Water","Rescue Diver","Divemaster","Instructeur","Initiateur / Moniteur","Directeur de plongée","Autre"];
const PAYMENTS=["Espèces","Virement","PayPal","Carte 6 plongées","Carte 8 plongées","Carte 10 plongées"];
const MONITORS=["Patrick","Justine"];
const STAB_SIZES=["Taille 1","Taille 2","Junior"];
const FONCTIONS_PALANQUEE=["Plongeur","Baptême"];
const CONTACT_SOURCES=["Email","WhatsApp Justine","WhatsApp Patrick","Instagram","Messenger","Appel téléphonique","Autre"];
const RAISONS_ANNULATION=["Météo défavorable","Mer agitée","Problème technique bateau","Annulation client","Problème médical","Autre"];
const DIVE_SLOTS=[
  {id:"matin1",label:"Sortie Matin 1",defaultTime:"07:00",icon:"🌅",color:"#0077aa",colorBg:"rgba(0,120,180,.07)"},
  {id:"matin2",label:"Sortie Matin 2",defaultTime:"09:00",icon:"☀️",color:"#1a9a4a",colorBg:"rgba(0,160,80,.07)"},
  {id:"apmidi",label:"Sortie Après-midi",defaultTime:"13:30",icon:"🌊",color:"#d4820a",colorBg:"rgba(220,130,0,.07)"}
];
const MAX_PER_MONITOR=5;
const MAX_DIVERS=MAX_PER_MONITOR*2;
const DAY_SHORT=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
const DAY_FULL=["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
const MONTHS=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function getWeekDays(offset=0){const now=new Date(),mon=new Date(now);mon.setDate(now.getDate()-((now.getDay()+6)%7)+offset*7);return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});}
function dKey(d){
    if(!(d instanceof Date))return d;
    const y=d.getFullYear();
    const m=String(d.getMonth()+1).padStart(2,'0');
    const day=String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }
function todayK(){
    const now=new Date();
    const y=now.getFullYear();
    const m=String(now.getMonth()+1).padStart(2,'0');
    const d=String(now.getDate()).padStart(2,'0');
    return `${y}-${m}-${d}`;
  }
function fmtDate(d){return `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;}
function fmtXPF(n){return n?Number(n).toLocaleString('fr')+" XPF":"";}

const EMPTY_DIVER={nom:"",prenom:"",masquePerso:false,palmePerso:false,combiPerso:false,stabPerso:false,stab:"Taille 1",combi:"",palmes:"",taille:"",residence:"",vehicule:false,rdvPoint:"",contactSource:"",paiement:"Espèces",montantPaye:"",prestation:"",carteUsed:"",certification:"PADI Open Water",nbPlongees:"",dernierePlongee:"",note:"",moniteur:MONITORS[0],isPalanqueeLeader:false,palanqueeName:"",palanqueeSize:1};
const EMPTY_PRO={societe:"",plongeur1:"",plongeur2:"",programme:"",montant:"",paiement:"Espèces",note:""};

function App(){
  const [weekOffset,setWeekOffset]=useState(0);
  const [planning,setPlanning]=useState({});
  const [selDay,setSelDay]=useState(null);
  const [selSlot,setSelSlot]=useState(null);
  const [view,setView]=useState("week");
  const [showForm,setShowForm]=useState(false);
  const [showProForm,setShowProForm]=useState(false);
  const [showPrestations,setShowPrestations]=useState(false);
  const [editId,setEditId]=useState(null);
  const [editProId,setEditProId]=useState(null);
  const [form,setForm]=useState(EMPTY_DIVER);
  const [proForm,setProForm]=useState(EMPTY_PRO);
  const [showCfg,setShowCfg]=useState(false);
  const [cfg,setCfg]=useState({site:DIVE_SITES[0],monitor:MONITORS[0],time:"07:00",dp:MONITORS[0]});
  const [syncing,setSyncing]=useState(false);
  const [diversDB,setDiversDB]=useState([]);
  const [diversSearch,setDiversSearch]=useState("");
  const [showDiverProfile,setShowDiverProfile]=useState(null);
  const [lastSync,setLastSync]=useState(null);
  const days=getWeekDays(weekOffset);
  const tdk=todayK();

  useEffect(()=>{
    setSyncing(true);
    const unsub=db.collection("planning").doc("data").onSnapshot(snap=>{
      if(snap.exists)setPlanning(snap.data().planning||{});
      setLastSync(new Date());setSyncing(false);
    },()=>setSyncing(false));
    return()=>unsub();
  },[]);

  useEffect(()=>{
    const unsub=db.collection("divers").onSnapshot(snap=>{
      const list=snap.docs.map(d=>({id:d.id,...d.data()}));
      list.sort((a,b)=>(a.nom+a.prenom).localeCompare(b.nom+b.prenom));
      setDiversDB(list);
    });
    return()=>unsub();
  },[]);

  const save=async(p)=>{setSyncing(true);try{await db.collection("planning").doc("data").set({planning:p,updatedAt:new Date().toISOString()});}catch(e){console.error(e);}setSyncing(false);};
  const getSlot=(day,sid)=>{const def=DIVE_SLOTS.find(s=>s.id===sid);return planning[dKey(day)]?.[sid]||{site:DIVE_SITES[0],monitor:MONITORS[0],divers:[],proGroups:[],extraMonitors:{},time:def?.defaultTime||"07:00",dp:"Patrick",annule:false,raisonAnnulation:"",params:{profPrevue:"",profReelle:"",dureePrevue:"",dureeReelle:"",pressionDepart:"",pressionRetour:"",palierSecu:"",tempsRemontee:"",visibilite:"",courant:"",commentaire:""}};};
  const updateSlot=async(day,sid,data)=>{const dk=dKey(day);const p={...planning,[dk]:{...(planning[dk]||{}),[sid]:data}};setPlanning(p);await save(p);};

  const openCfg=(day,sid)=>{const s=getSlot(day,sid);const def=DIVE_SLOTS.find(sl=>sl.id===sid);setSelDay(day);setSelSlot(sid);setCfg({site:s.site||DIVE_SITES[0],monitor:s.monitor||MONITORS[0],time:s.time||def?.defaultTime,dp:s.dp||"Patrick"});setShowCfg(true);};
  const saveCfg=async()=>{const s=getSlot(selDay,selSlot);await updateSlot(selDay,selSlot,{...s,...cfg});setShowCfg(false);};

  const openAdd=(day,sid,moniteur)=>{
    const slot=getSlot(day,sid);
    if(slot.divers.filter(d=>d.moniteur===moniteur).length>=MAX_PER_MONITOR)return;
    setSelDay(day);setSelSlot(sid);setEditId(null);setForm({...EMPTY_DIVER,moniteur});setShowForm(true);
  };
  const openEdit=(day,sid,diver)=>{setSelDay(day);setSelSlot(sid);setEditId(diver.id);setForm({...EMPTY_DIVER,...diver});setShowForm(true);};
  const saveDiver=async()=>{
    if(!form.nom.trim()||!form.prenom.trim())return;
    const slot=getSlot(selDay,selSlot);
    const nd=editId?slot.divers.map(d=>d.id===editId?{...form,id:editId}:d):[...slot.divers,{...form,id:genId()}];
    await updateSlot(selDay,selSlot,{...slot,divers:nd});
    // Save to divers history
    const diverKey=(form.prenom.trim()+"-"+form.nom.trim()).toLowerCase().replace(/[^a-z0-9-]/g,"_");
    // Update plongee history dates
    const diverKey2=(form.prenom.trim()+"-"+form.nom.trim()).toLowerCase().replace(/[^a-z0-9-]/g,"_");
    let existingHistory=[];
    try{const ex=await db.collection("divers").doc(diverKey2).get();if(ex.exists)existingHistory=ex.data().historyDates||[];}catch(_){}
    const todayStr=dKey(selDay);
    if(!existingHistory.includes(todayStr))existingHistory=[...existingHistory,todayStr].sort().slice(-50);
    const diverProfile={nom:form.nom,prenom:form.prenom,certification:form.certification,nbPlongees:form.nbPlongees,dernierePlongee:form.dernierePlongee,stab:form.stab,combi:form.combi,palmes:form.palmes,masquePerso:form.masquePerso,palmePerso:form.palmePerso,combiPerso:form.combiPerso,stabPerso:form.stabPerso,residence:form.residence,vehicule:form.vehicule,rdvPoint:form.rdvPoint,contactSource:form.contactSource,paiement:form.paiement,note:form.note,updatedAt:new Date().toISOString(),historyDates:existingHistory,reservations:form.reservations||[]};
    try{await db.collection("divers").doc(diverKey2).set(diverProfile,{merge:true});}catch(e){console.error(e);}
    setShowForm(false);
  };
  const delDiver=async(day,sid,did)=>{const slot=getSlot(day,sid);await updateSlot(day,sid,{...slot,divers:slot.divers.filter(d=>d.id!==did)});};

  const openAddPro=(day,sid)=>{setSelDay(day);setSelSlot(sid);setEditProId(null);setProForm(EMPTY_PRO);setShowProForm(true);};
  const openEditPro=(day,sid,pg)=>{setSelDay(day);setSelSlot(sid);setEditProId(pg.id);setProForm({...pg});setShowProForm(true);};
  const saveProGroup=async()=>{
    if(!proForm.societe.trim())return;
    const slot=getSlot(selDay,selSlot);
    const pgs=slot.proGroups||[];
    const nd=editProId?pgs.map(p=>p.id===editProId?{...proForm,id:editProId}:p):[...pgs,{...proForm,id:genId()}];
    await updateSlot(selDay,selSlot,{...slot,proGroups:nd});setShowProForm(false);
  };
  const delProGroup=async(day,sid,pid)=>{const slot=getSlot(day,sid);await updateSlot(day,sid,{...slot,proGroups:(slot.proGroups||[]).filter(p=>p.id!==pid)});};

  const setAnnulationSortie=async(day,sid,annule,raison)=>{
    const s=getSlot(day,sid);
    await updateSlot(day,sid,{...s,annule,raisonAnnulation:raison||""});
  };

  const toggleAnnulationDiver=async(day,sid,diverId,annule,raison)=>{
    const s=getSlot(day,sid);
    const nd=s.divers.map(d=>d.id===diverId?{...d,annule,raisonAnnulation:raison||""}:d);
    await updateSlot(day,sid,{...s,divers:nd});
  };

  const updateParams=async(day,sid,params)=>{
    const s=getSlot(day,sid);
    await updateSlot(day,sid,{...s,params});
  };

  const toggleExtraMonitor=async(day,sid,monGrp)=>{
    const slot=getSlot(day,sid);
    const em={...(slot.extraMonitors||{})};
    em[monGrp]=!em[monGrp];
    await updateSlot(day,sid,{...slot,extraMonitors:em});
  };

  const certColor=(c)=>{if(!c)return"#0077aa";if(c.includes("Baptême"))return"#d4820a";if(c.includes("Advanced")||c.includes("Niveau 2")||c.includes("Niveau 3"))return"#0077aa";if(c.includes("Rescue")||c.includes("Niveau 4")||c.includes("Niveau 5"))return"#1a8a4a";if(c.includes("Divemaster")||c.includes("Instructor")||c.includes("Moniteur")||c.includes("MF"))return"#c05000";return"#3a6a8a";};
  const payIcon=(p)=>({"Espèces":"💵","Virement":"🏦","PayPal":"🅿️","Carte 6 plongées":"🃏","Carte 8 plongées":"🃏","Carte 10 plongées":"🃏"}[p]||"💳");
  const isCard=(p)=>p&&p.startsWith("Carte");
  const cardTotal=(p)=>p==="Carte 6 plongées"?6:p==="Carte 8 plongées"?8:p==="Carte 10 plongées"?10:0;
  const lastDiveInfo=(ds)=>{if(!ds)return{icon:"⚪"};const m=Math.floor((new Date()-new Date(ds))/(1000*60*60*24*30));if(m>12)return{icon:"🔴"};if(m>6)return{icon:"🟡"};return{icon:"🟢"};};

  const countBottles=(day,sid)=>{
    const s=getSlot(day,sid);
    if(s.divers.length===0&&(!s.proGroups||s.proGroups.length===0))return 0;
    const em=s.extraMonitors||{};
    const monitorBlocs=MONITORS.reduce((t,mon)=>{
      const grpHasDivers=s.divers.filter(d=>d.moniteur===mon).length>0;
      if(!grpHasDivers)return t;
      return t+1+(em[mon]?1:0);
    },0);
    const proBlocs=(s.proGroups||[]).reduce((t,pg)=>{
      let n=0;if(pg.plongeur1)n++;if(pg.plongeur2)n++;return t+n;
    },0);
    return s.divers.length+monitorBlocs+proBlocs;
  };

  const weekBottles=days.reduce((t,d)=>t+DIVE_SLOTS.reduce((b,s)=>b+countBottles(d,s.id),0),0);
  const weekDivers=days.reduce((a,d)=>a+DIVE_SLOTS.reduce((b,s)=>b+getSlot(d,s.id).divers.length,0),0);

  // Revenue this week
  const weekRevenue=days.reduce((total,d)=>{
    return total+DIVE_SLOTS.reduce((t,slot)=>{
      const s=getSlot(d,slot.id);
      const diverRev=s.divers.reduce((a,dv)=>a+(Number(dv.montantPaye)||0),0);
      const proRev=(s.proGroups||[]).reduce((a,pg)=>a+(Number(pg.montant)||0),0);
      return t+diverRev+proRev;
    },0);
  },0);

  const printPdf=(day,sid)=>{
    const slot=getSlot(day,sid);
    const slotDef=DIVE_SLOTS.find(s=>s.id===sid);
    const bottles=countBottles(day,sid);
    const hasData=slot.params&&Object.values(slot.params).some(v=>v);
    const em=slot.extraMonitors||{};
    const win=window.open('','_blank');
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Feuille de palanquée</title><style>
      body{font-family:Arial,sans-serif;padding:12mm;color:#000;font-size:10pt}
      h1{font-size:14pt;margin-bottom:4px}
      .header{display:flex;justify-content:space-between;border-bottom:2px solid #0066aa;padding-bottom:8px;margin-bottom:12px}
      .info{font-size:9pt;color:#333;margin-bottom:3px}
      table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:9pt}
      th{background:#0066aa;color:#fff;padding:5px 7px;text-align:left}
      td{padding:5px 7px;border-bottom:1px solid #ddd}
      tr:nth-child(even)td{background:#f0f6ff}
      .gt{font-weight:bold;font-size:10pt;margin:10px 0 4px;color:#0066aa;border-left:3px solid #0066aa;padding-left:8px}
      .footer{margin-top:16px;font-size:8pt;color:#888;border-top:1px solid #ccc;padding-top:8px;display:flex;justify-content:space-between}
      .sign{margin-top:24px;display:flex;gap:40px}
      .sign-box{border-top:1px solid #000;width:150px;padding-top:4px;font-size:8pt;color:#555}
    </style></head><body>
    <div class="header">
      <div>
        <h1>🤿 Dive N' Smile – Bora-Bora</h1>
        <div class="info"><b>Feuille de palanquée officielle</b></div>
        <div class="info">Date : <b>${fmtDate(day)}</b> | ${slotDef.label} – <b>${slot.time||slotDef.defaultTime}</b></div>
        <div class="info">Site : <b>${slot.site}</b> | Directeur de plongée : <b>${slot.dp||'Patrick'}</b> | Guide de palanquée : <b>Justine</b></div>
        <div class="info">Plongeurs : <b>${slot.divers.length}</b> | Blocs : <b>${bottles}</b></div>
      </div>
      <div style="text-align:right;font-size:8pt;color:#888">Jeunesse & Sports<br/>Polynésie française</div>
    </div>
    ${MONITORS.map(mon=>{
      const grp=slot.divers.filter(d=>d.moniteur===mon);
      if(grp.length===0)return'';
      const hasExtra=em[mon];
      return`<div class="gt">Palanquée ${mon} — ${grp.length} plongeur(s) + ${hasExtra?'2':'1'} moniteur(s) = ${grp.length+(hasExtra?2:1)} blocs</div>
      <table><thead><tr><th>#</th><th>Nom & Prénom</th><th>Certification</th><th>Fonction</th><th>Prestation</th><th>Nb plongées</th><th>Paiement</th></tr></thead>
      <tbody>${grp.map((d,i)=>`<tr><td>${i+1}${d.isPalanqueeLeader?` <b>(Chef: ${d.palanqueeName})</b>`:''}</td><td><b>${(d.nom||'').toUpperCase()} ${d.prenom||''}</b></td><td>${d.certification||'—'}</td><td>${d.prestation||'—'}</td><td>${d.nbPlongees||'—'}</td><td>${d.dernierePlongee?new Date(d.dernierePlongee).toLocaleDateString('fr'):'—'}</td><td>${d.montantPaye?Number(d.montantPaye).toLocaleString('fr')+' XPF':''} ${isCard(d.paiement)?`Carte ${cardTotal(d.paiement)} (${d.carteUsed||0} utilisées)`:d.paiement}</td></tr>`).join('')}</tbody></table>`;
    }).join('')}
    ${(slot.proGroups||[]).length>0?`<div class="gt">Sorties Pro</div>${(slot.proGroups||[]).map(pg=>`<p><b>${pg.societe}</b> — ${pg.plongeur1||''}${pg.plongeur2?' · '+pg.plongeur2:''} — ${pg.programme||''} — ${pg.montant?Number(pg.montant).toLocaleString('fr')+' XPF':''}</p>`).join('')}`:''}
    <div class="sign"><div class="sign-box">Directeur de plongée : ${slot.dp||'Patrick'}<br/><br/>Signature :</div><div class="sign-box">Guide de palanquée : Justine<br/><br/>Signature :</div></div>
    <div class="footer"><span>Dive N' Smile Bora-Bora</span><span>Blocs : ${bottles}</span></div>
    </body></html>`;
    win.document.write(html);win.document.close();setTimeout(()=>win.print(),400);
  };

  const Chk=({checked,onChange,label,color="#1a8a4a"})=>(
    <div style={{display:"flex",alignItems:"center",gap:9,cursor:"pointer",padding:"3px 0"}} onClick={onChange}>

      {key:"dureeReelle",label:"Durée réelle (min)",ph:"ex: 42"},

      {key:"pressionRetour",label:"Pression retour (bar)",ph:"ex: 80"},
      {key:"palierSecu",label:"Palier sécu (min/m)",ph:"ex: 3min/5m"},
      {key:"tempsRemontee",label:"Temps remontée (min)",ph:"ex: 8"},
      {key:"visibilite",label:"Visibilité (m)",ph:"ex: 20"},
      {key:"courant",label:"Courant",ph:"Nul / Faible / Modéré / Fort"},

          <span>📋 Paramètres Jeunesse & Sports</span>
          <span style={{fontSize:11}}>{hasData?"✅ Renseignés":open?"▲":"▼"}</span>
        </button>
        {open&&(
          <div style={{background:"rgba(80,120,200,.05)",border:"1px solid rgba(80,120,200,.15)",borderRadius:13,padding:13,marginTop:7}}>

              ))}
            </div>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:10,color:"#5a8a9a",marginBottom:3}}>Commentaire / Observations faune</div>
              <input className="inp" placeholder="Raies mantas, tortues, visibilité exceptionnelle..." value={local.commentaire||""} onChange={e=>setLocal(l=>({...l,commentaire:e.target.value}))} style={{fontSize:13}}/>
            </div>
            <button className="btn-c" style={{width:"100%",padding:"11px",fontSize:14,borderRadius:11}} onClick={save}>💾 Enregistrer les paramètres</button>
          </div>

  const DiverCard=({diver,day,sid})=>(
    <div className="dr" onClick={()=>openEdit(day,sid,diver)} style={{opacity:diver.annule?0.5:1,borderColor:diver.annule?"rgba(200,50,50,.3)":"rgba(0,120,180,.1)",background:diver.annule?"rgba(200,50,50,.04)":"rgba(255,255,255,.78)"}}>
      <div style={{width:40,height:40,borderRadius:"50%",background:`${certColor(diver.certification)}18`,border:`2px solid ${certColor(diver.certification)}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:800,flexShrink:0,color:certColor(diver.certification)}}>
        {diver.prenom?.[0]?.toUpperCase()}{diver.nom?.[0]?.toUpperCase()}
      </div>
      <div style={{flex:1,overflow:"hidden",minWidth:0}}>
        <div style={{fontSize:16,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",color:"#1a2a3a"}}>
          {diver.prenom} {diver.nom}
          {diver.isPalanqueeLeader&&<span style={{fontSize:11,background:"#0077aa",color:"#fff",borderRadius:8,padding:"1px 6px",marginLeft:5}}>Chef {diver.palanqueeName}</span>}
        </div>
        <div style={{display:"flex",gap:4,marginTop:3,flexWrap:"wrap"}}>
          {diver.prestation&&<span className="tag" style={{background:"rgba(0,100,150,.1)",color:"#005588",border:"1px solid rgba(0,100,150,.2)"}}>{diver.prestation.split(" —")[0]}</span>}
          {diver.montantPaye&&!isCard(diver.paiement)&&<span className="tag" style={{background:"rgba(0,150,80,.1)",color:"#1a7a4a",border:"1px solid rgba(0,150,80,.2)"}}>{payIcon(diver.paiement)} {Number(diver.montantPaye).toLocaleString('fr')}F</span>}
          {isCard(diver.paiement)&&<span className="tag" style={{background:"rgba(0,150,80,.1)",color:"#1a7a4a",border:"1px solid rgba(0,150,80,.2)"}}>🃏{diver.carteUsed||0}/{cardTotal(diver.paiement)}</span>}
          {diver.vehicule?<span className="tag" style={{background:"rgba(0,150,80,.1)",color:"#1a7a4a",border:"1px solid rgba(0,150,80,.2)"}}>🚗 {diver.rdvPoint?diver.rdvPoint.slice(0,10):"Véhiculé"}</span>:diver.residence?<span className="tag" style={{background:"rgba(0,100,150,.08)",color:"#1a5a7a",border:"1px solid rgba(0,100,150,.15)"}}>📍{diver.residence.slice(0,10)}</span>:null}
          {diver.dernierePlongee&&<span style={{fontSize:14}}>{lastDiveInfo(diver.dernierePlongee).icon}</span>}
          {diver.annule&&<span className="tag" style={{background:"rgba(200,50,50,.1)",color:"#cc3333",border:"1px solid rgba(200,50,50,.2)"}}>❌ Annulé</span>}
        </div>
        {diver.annule&&diver.raisonAnnulation&&<div style={{fontSize:11,color:"#cc3333",marginTop:3,fontStyle:"italic"}}>{diver.raisonAnnulation}</div>}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
        <button onClick={e=>{e.stopPropagation();const raison=diver.annule?"":prompt("Raison de l'annulation :",diver.raisonAnnulation||"");if(diver.annule||raison!==null)toggleAnnulationDiver(day,sid,diver.id,!diver.annule,raison);}} style={{background:diver.annule?"rgba(0,150,80,.1)":"rgba(200,100,0,.08)",border:`1px solid ${diver.annule?"rgba(0,150,80,.2)":"rgba(200,100,0,.2)"}`,borderRadius:8,color:diver.annule?"#1a7a4a":"#a05000",cursor:"pointer",padding:"5px 7px",fontSize:12,fontWeight:700}}>{diver.annule?"↩️":"❌"}</button>
        <button onClick={e=>{e.stopPropagation();delDiver(day,sid,diver.id);}} style={{background:"rgba(200,50,50,.1)",border:"1px solid rgba(200,50,50,.2)",borderRadius:8,color:"#cc3333",cursor:"pointer",padding:"5px 7px",fontSize:13}}>🗑</button>
      </div>
    </div>
  );

  const MonitorGroup=({mon,slot,day,sid,color,slotColor})=>{
    const grp=slot.divers.filter(d=>d.moniteur===mon);
    const full=grp.length>=MAX_PER_MONITOR;
    const em=slot.extraMonitors||{};
    const hasExtra=em[mon];
    return(
      <div style={{marginBottom:13}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,padding:"8px 12px",background:`${color}10`,borderRadius:12,border:`1.5px solid ${color}25`}}>
          <div style={{fontSize:14,fontWeight:700,color}}>{mon==="Patrick"?"🧑‍🦱":"👩"} Palanquée {mon}</div>
          <span style={{fontSize:12,fontFamily:"'Space Mono',monospace",color,fontWeight:700}}>{grp.length}/{MAX_PER_MONITOR}</span>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:8}}>
          {grp.map(diver=><DiverCard key={diver.id} diver={diver} day={day} sid={sid}/>)}
        </div>
        {grp.length>0&&(
          <button onClick={()=>toggleExtraMonitor(day,sid,mon)} style={{width:"100%",padding:"8px",fontSize:13,borderRadius:10,border:`1.5px dashed ${hasExtra?"#1a8a4a":"rgba(0,120,180,.25)"}`,background:hasExtra?"rgba(0,150,80,.08)":"transparent",color:hasExtra?"#1a8a4a":"#5a8a9a",cursor:"pointer",fontFamily:"'Outfit',sans-serif",fontWeight:600,marginBottom:7}}>
            {hasExtra?"✓ +1 Moniteur suppl. (2 blocs moniteurs)":"+ Moniteur supplémentaire"}
          </button>
        )}
        {!full?(
          <button className="btn-c" style={{width:"100%",padding:"11px",fontSize:14,borderRadius:12,background:`linear-gradient(135deg,${slotColor||color},${slotColor||color}bb)`}} onClick={()=>openAdd(day,sid,mon)}>

        ):(
          <div style={{textAlign:"center",fontSize:13,color:"#cc5500",fontWeight:700,padding:"4px 0"}}>🔴 Palanquée complète 5/5</div>
        )}
      </div>

  return(
    <div style={{position:"relative",minHeight:"100vh",background:"#f5ead8"}}>
      <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",overflow:"hidden"}}>

        <div style={{position:"absolute",bottom:60,left:-40,width:180,height:180,borderRadius:"50%",background:"radial-gradient(circle,rgba(200,150,50,.07) 0%,transparent 65%)"}}/>
      </div>
      <div style={{position:"relative",zIndex:1}}>

        {/* HEADER */}
        <div style={{padding:"13px 20px",borderBottom:"2px solid rgba(0,120,180,.1)",background:"linear-gradient(135deg,rgba(255,255,255,.92),rgba(255,248,230,.95))"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <img src={LOGO_SRC} alt="Logo" style={{width:58,height:58,borderRadius:"50%",objectFit:"cover",border:"2px solid rgba(0,150,200,.3)",boxShadow:"0 2px 10px rgba(0,100,180,.15)",flexShrink:0}}/>
              <div>
                <div style={{fontSize:21,fontWeight:900,letterSpacing:-0.5,lineHeight:1.1,color:"#1a2a3a"}}>Dive N' Smile</div>
                <div style={{fontSize:13,fontWeight:700,color:"#0077aa",letterSpacing:1}}>Bora-Bora 🌺</div>
                <div style={{fontSize:10,color:"#5a8a9a",fontWeight:600,marginTop:1,fontFamily:"'Space Mono',monospace",textTransform:"uppercase",letterSpacing:1}}>Planning Sorties</div>
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{display:"flex",alignItems:"center",gap:5,justifyContent:"flex-end"}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:syncing?"#e8a020":"#1a9a4a"}}/>
                <span style={{fontSize:10,color:"#5a8a9a",fontFamily:"'Space Mono',monospace"}}>{syncing?"sync...":"live"}</span>
              </div>
              {lastSync&&<div style={{fontSize:9,color:"#9ab0bb",fontFamily:"'Space Mono',monospace",marginTop:2}}>{lastSync.toLocaleTimeString("fr",{hour:"2-digit",minute:"2-digit"})}</div>}
            </div>
          </div>
          <div style={{display:"flex",gap:7,marginTop:12}}>
            {[
              {v:days.reduce((a,d)=>a+DIVE_SLOTS.reduce((b,s)=>b+(getSlot(d,s.id).divers.length>0||((getSlot(d,s.id).proGroups||[]).length>0)?1:0),0),0),l:"Sorties actives",c:"#0077aa"},
              {v:weekDivers,l:"Plongeurs/sem.",c:"#0077aa"},
              {v:weekBottles,l:"🪣 Blocs/sem.",c:"#1a8a4a"},
              {v:weekRevenue>0?Math.round(weekRevenue/1000)+"k":"0",l:"💰 XPF/sem.",c:"#c05000"}
            ].map(s=>(
              <div key={s.l} style={{flex:1,padding:"7px 4px",textAlign:"center",background:"rgba(255,255,255,.75)",borderRadius:13,border:"1px solid rgba(0,120,180,.1)",boxShadow:"0 1px 4px rgba(0,80,120,.05)"}}>
                <div style={{fontSize:19,fontWeight:900,color:s.c,fontFamily:"'Space Mono',monospace"}}>{s.v}</div>
                <div style={{fontSize:9,color:"#5a8a9a",fontWeight:600,marginTop:1}}>{s.l}</div>
              </div>
            ))}
          </div>
        </div>

        {/* WEEK NAV */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 20px",borderBottom:"1px solid rgba(0,120,180,.09)",background:"rgba(255,255,255,.5)"}}>
          <button className="btn-g" style={{padding:"8px 16px",fontSize:20,lineHeight:1}} onClick={()=>setWeekOffset(w=>w-1)}>‹</button>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:15,fontWeight:700,color:"#1a2a3a"}}>{weekLabel}</div>
            <div style={{fontSize:10,color:"#5a8a9a",fontFamily:"'Space Mono',monospace"}}>{days[0].toLocaleDateString("fr",{day:"numeric",month:"short"})} — {days[6].toLocaleDateString("fr",{day:"numeric",month:"short"})}</div>
          </div>
          <button className="btn-g" style={{padding:"8px 16px",fontSize:20,lineHeight:1}} onClick={()=>setWeekOffset(w=>w+1)}>›</button>
        </div>

        {/* DAY TABS */}
        <div style={{display:"flex",gap:6,padding:"11px 20px",overflowX:"auto",background:"rgba(255,255,255,.4)"}}>
          {days.map((day,i)=>{
            const dk=dKey(day);const total=DIVE_SLOTS.reduce((a,s)=>a+getSlot(day,s.id).divers.length,0);
            const isToday=dk===tdk;const isSel=selDay&&dKey(selDay)===dk&&view==="day";
            return(
              <button key={dk} onClick={()=>{setSelDay(day);setView("day");}} style={{flex:"0 0 auto",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"8px 10px",borderRadius:13,border:isSel?"2px solid #0077aa":isToday?"2px solid rgba(0,120,180,.35)":"2px solid transparent",background:isSel?"rgba(0,120,180,.12)":isToday?"rgba(0,120,180,.05)":"rgba(255,255,255,.5)",cursor:"pointer",minWidth:44,boxShadow:isSel?"0 2px 8px rgba(0,100,180,.12)":"none"}}>
                <span style={{fontSize:10,color:isSel?"#0077aa":"#5a8a9a",fontWeight:700,fontFamily:"'Space Mono',monospace"}}>{DAY_SHORT[i]}</span>
                <span style={{fontSize:18,fontWeight:800,color:isSel?"#0077aa":isToday?"#1a2a3a":"#4a7a8a"}}>{day.getDate()}</span>
                {total>0&&<span style={{background:"#0077aa",color:"#fff",borderRadius:10,fontSize:9,fontWeight:800,padding:"1px 6px",fontFamily:"'Space Mono',monospace"}}>{total}</span>}
              </button>
            );
          })}
        </div>

        {view==="week"&&(
          <div className="fu" style={{padding:"6px 20px 120px"}}>
            {days.map((day,i)=>{
              const dk=dKey(day);const isToday=dk===tdk;
              const dayBottles=DIVE_SLOTS.reduce((t,slot)=>t+countBottles(day,slot.id),0);
              const dayRevenue=DIVE_SLOTS.reduce((t,slot)=>{
                const s=getSlot(day,slot.id);
                return t+s.divers.reduce((a,dv)=>a+(Number(dv.montantPaye)||0),0)+(s.proGroups||[]).reduce((a,pg)=>a+(Number(pg.montant)||0),0);
              },0);
              return(
                <div key={dk} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0 5px"}}>

                  </div>
                  <div style={{display:"flex",gap:7}}>
                    {DIVE_SLOTS.map(slot=>{
                      const s=getSlot(day,slot.id);const cnt=s.divers.length;const pct=(cnt/MAX_DIVERS)*100;
                      const grpP=s.divers.filter(d=>d.moniteur==="Patrick").length;
                      const grpJ=s.divers.filter(d=>d.moniteur==="Justine").length;
                      const hasPro=(s.proGroups||[]).length>0;
                      return(
                        <div key={slot.id} onClick={()=>{setSelDay(day);setView("day");}} style={{flex:1,padding:"9px 11px",cursor:"pointer",borderRadius:14,background:cnt>0||hasPro?slot.colorBg:"rgba(255,255,255,.78)",border:`1px solid ${slot.color}22`,borderLeft:`4px solid ${cnt===MAX_DIVERS?"#cc5500":cnt>0||hasPro?slot.color:slot.color+"44"}`,boxShadow:"0 1px 4px rgba(0,80,120,.04)"}}>
                          <div style={{fontSize:11,fontWeight:700,color:slot.color}}>{slot.icon} {s.time||slot.defaultTime}</div>
                          <div style={{fontSize:13,fontWeight:700,marginTop:2,color:cnt>0||hasPro?"#1a2a3a":"#9ab0bb",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.site||"—"}</div>
                          {cnt>0&&<div style={{fontSize:10,color:"#4a7a8a",marginTop:1}}>🧑‍🦱{grpP} 👩{grpJ}{hasPro&&" 🔬"}</div>}
                          <div style={{display:"flex",alignItems:"center",gap:4,marginTop:4}}>
                            <div style={{flex:1,height:4,background:"rgba(0,100,150,.08)",borderRadius:3}}><div style={{height:"100%",width:`${pct}%`,background:cnt===MAX_DIVERS?"#cc5500":"#0077aa",borderRadius:3}}/></div>
                            <span style={{fontSize:10,color:cnt===MAX_DIVERS?"#cc5500":"#5a8a9a",fontFamily:"'Space Mono',monospace",fontWeight:700}}>{cnt}/{MAX_DIVERS}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{height:1,background:"rgba(0,100,150,.07)",marginTop:8}}/>
                </div>
              );
            })}
          </div>
        )}

        {/* DAY VIEW */}
        {view==="day"&&selDay&&(
          <div className="fu" style={{padding:"12px 20px 120px"}}>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:23,fontWeight:800,color:"#1a2a3a"}}>{DAY_FULL[days.findIndex(d=>dKey(d)===dKey(selDay))]}</div>
              <div style={{fontSize:12,color:"#5a8a9a",fontFamily:"'Space Mono',monospace"}}>{fmtDate(selDay)}</div>
              <div style={{display:"flex",gap:14,marginTop:6}}>
                <div style={{fontSize:13,color:"#1a8a4a",fontWeight:700}}>🪣 {DIVE_SLOTS.reduce((t,slot)=>t+countBottles(selDay,slot.id),0)} blocs</div>
                {DIVE_SLOTS.reduce((t,slot)=>{const s=getSlot(selDay,slot.id);return t+s.divers.reduce((a,dv)=>a+(Number(dv.montantPaye)||0),0)+(s.proGroups||[]).reduce((a,pg)=>a+(Number(pg.montant)||0),0);},0)>0&&(
                  <div style={{fontSize:13,color:"#c05000",fontWeight:700}}>💰 {DIVE_SLOTS.reduce((t,slot)=>{const s=getSlot(selDay,slot.id);return t+s.divers.reduce((a,dv)=>a+(Number(dv.montantPaye)||0),0)+(s.proGroups||[]).reduce((a,pg)=>a+(Number(pg.montant)||0),0);},0).toLocaleString('fr')} XPF</div>
                )}
              </div>
            </div>
            {DIVE_SLOTS.map(slot=>{
              const s=getSlot(selDay,slot.id);
              const bottles=countBottles(selDay,slot.id);
              return(
                <div key={slot.id} style={{marginBottom:14,borderRadius:18,overflow:"hidden",background:"rgba(255,255,255,.82)",border:"1px solid rgba(0,120,180,.1)",boxShadow:"0 2px 10px rgba(0,80,120,.07)"}}>
                  <div style={{padding:"12px 14px 10px",borderBottom:"1px solid rgba(0,120,180,.09)",display:"flex",justifyContent:"space-between",alignItems:"flex-start",background:"linear-gradient(135deg,rgba(255,255,255,.9),rgba(240,248,255,.9))"}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:700,color:slot.color}}>{slot.icon} {slot.label} · {s.time||slot.defaultTime}</div>
                      <div style={{fontSize:17,fontWeight:800,marginTop:2,color:"#1a2a3a"}}>📍 {s.site}</div>
                      <div style={{fontSize:12,color:"#4a7a8a",marginTop:1}}>
                        🎯 DP : <b>{s.dp||"Patrick"}</b> · GP : <b>Justine</b> &nbsp;👥 {s.divers.filter(d=>!d.annule).length}/{MAX_DIVERS}
                        {bottles>0&&<span style={{color:"#1a8a4a",marginLeft:6}}>🪣{bottles}</span>}
                      </div>
                      {s.annule&&<div style={{fontSize:12,color:"#cc3333",fontWeight:700,marginTop:3}}>❌ SORTIE ANNULÉE — {s.raisonAnnulation}</div>}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:5,alignItems:"flex-end"}}>
                      <button className="btn-g" style={{padding:"6px 10px",fontSize:13}} onClick={()=>openCfg(selDay,slot.id)}>⚙️</button>
                      <button style={{padding:"6px 10px",fontSize:13,background:"rgba(0,120,180,.08)",border:"1px solid rgba(0,120,180,.2)",borderRadius:9,color:"#0077aa",cursor:"pointer",fontFamily:"'Outfit',sans-serif",fontWeight:600}} onClick={()=>printPdf(selDay,slot.id)}>📄 PDF</button>

                    </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:11}}>
                <Chk checked={form.masquePerso} onChange={()=>setForm(f=>({...f,masquePerso:!f.masquePerso}))} label="Masque" color="#d4820a"/>
                <Chk checked={form.palmePerso} onChange={()=>setForm(f=>({...f,palmePerso:!f.palmePerso}))} label="Palmes" color="#d4820a"/>
                <Chk checked={form.combiPerso} onChange={()=>setForm(f=>({...f,combiPerso:!f.combiPerso}))} label="Combi" color="#d4820a"/>
                <Chk checked={form.stabPerso} onChange={()=>setForm(f=>({...f,stabPerso:!f.stabPerso}))} label="Stab" color="#d4820a"/>
              </div>
              <div style={{display:"flex",gap:8}}>
                {!form.stabPerso&&<div style={{flex:1}}><div style={{fontSize:12,color:"#5a8a9a",marginBottom:4}}>Stab</div><select className="inp" value={form.stab} onChange={e=>setForm(f=>({...f,stab:e.target.value}))}>{STAB_SIZES.map(s=><option key={s}>{s}</option>)}</select></div>}
                {!form.combiPerso&&<div style={{flex:1}}><div style={{fontSize:12,color:"#5a8a9a",marginBottom:4}}>Combi</div><input className="inp" placeholder="M/L/XL" value={form.combi} onChange={e=>setForm(f=>({...f,combi:e.target.value}))}/></div>}
                {!form.palmePerso&&<div style={{flex:1}}><div style={{fontSize:12,color:"#5a8a9a",marginBottom:4}}>Palmes</div><input className="inp" placeholder="42" value={form.palmes} onChange={e=>setForm(f=>({...f,palmes:e.target.value}))}/></div>}
              </div>
            </div>

            {/* Certification */}
            <div style={{background:"rgba(0,120,180,.05)",borderRadius:14,padding:13,marginBottom:11,border:"1px solid rgba(0,120,180,.1)"}}>
              <div className="sl">🏅 Certification & Expérience</div>
              <div style={{marginBottom:9}}><div style={{fontSize:12,color:"#5a8a9a",marginBottom:4}}>Niveau</div>
                <select className="inp" value={form.certification} onChange={e=>setForm(f=>({...f,certification:e.target.value}))}>
                  {CERTIFICATIONS.map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
              <div style={{display:"flex",gap:9}}>
                <div style={{flex:1}}><div style={{fontSize:12,color:"#5a8a9a",marginBottom:4}}>Nb plongées</div><input className="inp" type="number" placeholder="24" value={form.nbPlongees} onChange={e=>setForm(f=>({...f,nbPlongees:e.target.value}))}/></div>
                <div style={{flex:1}}><div style={{fontSize:12,color:"#5a8a9a",marginBottom:4}}>Dernière plongée</div><input className="inp" type="date" value={form.dernierePlongee} onChange={e=>setForm(f=>({...f,dernierePlongee:e.target.value}))} style={{colorScheme:"light"}}/></div>
              </div>
            </div>

            {/* Mode de paiement */}
            <div style={{background:"rgba(0,120,180,.05)",borderRadius:14,padding:13,marginBottom:11,border:"1px solid rgba(0,120,180,.1)"}}>
              <div className="sl">💰 Mode de paiement</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:10}}>
                {PAYMENTS.map(p=>(
                  <button key={p} onClick={()=>setForm(f=>({...f,paiement:p,carteUsed:""}))} style={{padding:"9px 4px",borderRadius:11,border:`1.5px solid ${form.paiement===p?"#0077aa":"rgba(0,120,180,.18)"}`,background:form.paiement===p?"rgba(0,120,180,.1)":"rgba(255,255,255,.7)",color:form.paiement===p?"#0077aa":"#5a8a9a",fontSize:11,fontWeight:700,cursor:"pointer",textAlign:"center",lineHeight:1.5}}>
                    <div style={{fontSize:17}}>{payIcon(p)}</div>
                    <div style={{fontSize:9,marginTop:1}}>{p.replace("Carte ","").replace(" plongées","🤿")}</div>
                  </button>
                ))}
              </div>
              {isCard(form.paiement)&&(
                <div><div style={{fontSize:12,color:"#5a8a9a",marginBottom:4}}>Plongées utilisées sur cette carte (sur {cardTotal(form.paiement)})</div>
                  <input className="inp" type="number" min="0" max={cardTotal(form.paiement)} placeholder={`0 à ${cardTotal(form.paiement)}`} value={form.carteUsed} onChange={e=>setForm(f=>({...f,carteUsed:e.target.value}))}/>
                  {form.carteUsed!==undefined&&form.carteUsed!==''&&<div style={{fontSize:13,color:"#1a7a4a",marginTop:6,fontWeight:700}}>✅ {cardTotal(form.paiement)-Number(form.carteUsed)} plongées restantes</div>}
                </div>
              )}
            </div>

            {/* Contact source */}
            <div style={{background:"rgba(0,120,180,.05)",borderRadius:14,padding:13,marginBottom:11,border:"1px solid rgba(0,120,180,.1)"}}>
              <div className="sl">📱 Comment nous a-t-il contacté ?</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {CONTACT_SOURCES.map(src=>(
                  <button key={src} onClick={()=>setForm(f=>({...f,contactSource:src}))} style={{padding:"7px 12px",borderRadius:20,border:`1.5px solid ${form.contactSource===src?"#0077aa":"rgba(0,120,180,.18)"}`,background:form.contactSource===src?"rgba(0,120,180,.12)":"rgba(255,255,255,.7)",color:form.contactSource===src?"#0077aa":"#5a8a9a",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                    {src}
                  </button>
                ))}
              </div>
            </div>

            {/* Note */}
            <div style={{marginBottom:20}}>
              <div className="sl">📝 Note</div>
              <input className="inp" placeholder="Allergie, besoin particulier..." value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/>
            </div>

            <button className="btn-c" style={{width:"100%",padding:"16px",fontSize:17,borderRadius:14}} onClick={saveDiver}>
              {editId?"💾 Mettre à jour":"✅ Inscrire le plongeur"}
            </button>
          </div>
        </div>
      )}

      {/* PRO FORM */}
      {showProForm&&(
        <div style={{position:"fixed",inset:0,zIndex:100,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
          <div style={{position:"absolute",inset:0,background:"rgba(100,80,50,.55)",backdropFilter:"blur(6px)"}} onClick={()=>setShowProForm(false)}/>
          <div className="fu" style={{position:"relative",background:"#fdf6ec",borderRadius:"22px 22px 0 0",border:"1px solid rgba(0,150,80,.2)",padding:"22px 20px 40px",maxHeight:"85vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
              <div style={{fontSize:19,fontWeight:800,color:"#1a2a3a"}}>🔬 Sortie Professionnelle</div>
              <button className="btn-g" style={{padding:"6px 13px",fontSize:15}} onClick={()=>setShowProForm(false)}>✕</button>
            </div>
            <div style={{fontSize:12,color:"#5a8a9a",fontFamily:"'Space Mono',monospace",marginBottom:16}}>Biologistes, scientifiques, missions pro...</div>
            <div style={{background:"rgba(0,150,80,.05)",borderRadius:14,padding:13,marginBottom:11,border:"1px solid rgba(0,150,80,.12)"}}>
              <div className="sl">🏢 Société / Organisation</div>
              <input className="inp" placeholder="ex: CRIOBE, Institut Louis Malardé..." value={proForm.societe} onChange={e=>setProForm(f=>({...f,societe:e.target.value}))}/>
            </div>
            <div style={{background:"rgba(0,150,80,.05)",borderRadius:14,padding:13,marginBottom:11,border:"1px solid rgba(0,150,80,.12)"}}>
              <div className="sl">👤 Plongeurs</div>
              <div style={{marginBottom:9}}><div style={{fontSize:12,color:"#5a8a9a",marginBottom:4}}>Plongeur 1</div><input className="inp" placeholder="Nom & Prénom" value={proForm.plongeur1} onChange={e=>setProForm(f=>({...f,plongeur1:e.target.value}))}/></div>
              <div><div style={{fontSize:12,color:"#5a8a9a",marginBottom:4}}>Plongeur 2 (optionnel)</div><input className="inp" placeholder="Nom & Prénom" value={proForm.plongeur2} onChange={e=>setProForm(f=>({...f,plongeur2:e.target.value}))}/></div>
            </div>
            <div style={{background:"rgba(0,150,80,.05)",borderRadius:14,padding:13,marginBottom:11,border:"1px solid rgba(0,150,80,.12)"}}>
              <div className="sl">📋 Programme prévu</div>
              <input className="inp" placeholder="ex: Suivi récifs, transect, photo..." value={proForm.programme} onChange={e=>setProForm(f=>({...f,programme:e.target.value}))}/>
            </div>
            <div style={{background:"rgba(0,150,80,.05)",borderRadius:14,padding:13,marginBottom:18,border:"1px solid rgba(0,150,80,.12)"}}>
              <div className="sl">💳 Règlement</div>
              <div style={{display:"flex",gap:8,marginBottom:10}}>
                {["Espèces","Virement","PayPal"].map(p=>(
                  <button key={p} onClick={()=>setProForm(f=>({...f,paiement:p}))} style={{flex:1,padding:"10px 4px",borderRadius:11,border:`1.5px solid ${proForm.paiement===p?"#1a8a4a":"rgba(0,150,80,.18)"}`,background:proForm.paiement===p?"rgba(0,150,80,.1)":"rgba(255,255,255,.7)",color:proForm.paiement===p?"#1a8a4a":"#5a8a9a",fontSize:14,fontWeight:700,cursor:"pointer",textAlign:"center"}}>
                    {payIcon(p)} {p}
                  </button>
                ))}
              </div>
              <div><div style={{fontSize:12,color:"#5a8a9a",marginBottom:4}}>Montant (XPF)</div>
                <input className="inp" type="number" placeholder="ex: 25000" value={proForm.montant} onChange={e=>setProForm(f=>({...f,montant:e.target.value}))}/></div>
            </div>
            <button style={{width:"100%",padding:"16px",fontSize:17,borderRadius:14,background:"linear-gradient(135deg,#1a8a4a,#127a3a)",color:"#fff",border:"none",fontFamily:"'Outfit',sans-serif",fontWeight:700,cursor:"pointer"}} onClick={saveProGroup}>
              {editProId?"💾 Mettre à jour":"✅ Ajouter la sortie pro"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
