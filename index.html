function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function getWeekDays(offset=0){
  const now=new Date(),mon=new Date(now);
  mon.setDate(now.getDate()-((now.getDay()+6)%7)+offset*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function dKey(d){
  if(!(d instanceof Date))return d;
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function todayK(){

}
function fmtDate(d){return `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;}

function getDaysInRange(dateDebut,dateFin){
  const days=[];
  const d=new Date(dateDebut);
  const end=new Date(dateFin);
  while(d<=end){days.push(new Date(d));d.setDate(d.getDate()+1);}
  return days;
}

// ── DATA HELPERS ──────────────────────────────────────────────────────────────
function getSlot(day,sid,planning){
  const def=DIVE_SLOTS.find(s=>s.id===sid);
  return planning[dKey(day)]?.[sid]||{site:DIVE_SITES[0],monitor:MONITORS[0],divers:[],proGroups:[],extraMonitors:{},time:def?.defaultTime||"07:00",dp:"Patrick",annule:false,raisonAnnulation:"",params:{...EMPTY_SLOT_PARAMS}};
}

const SNORKEL_PRESTATIONS=["Sortie Snorkeling","Accompagnant (gratuit)"];
function isSnorkel(d){return SNORKEL_PRESTATIONS.some(p=>d.prestation&&d.prestation.includes(p.split("(")[0].trim()));}
function countBottles(day,sid,planning){
  const s=getSlot(day,sid,planning);
  if(!s.divers.length&&!(s.proGroups||[]).length)return 0;
  const em=s.extraMonitors||{};
  const activeDivers=s.divers.filter(d=>!d.annule);
  const monBlocs=MONITORS.reduce((t,mon)=>{
    const monDivers=activeDivers.filter(d=>d.moniteur===mon);
    if(!monDivers.length)return t;
    // Si tous les plongeurs du moniteur sont snorkel, pas de bloc moniteur
    const hasRealDiver=monDivers.some(d=>!isSnorkel(d));
    if(!hasRealDiver)return t;
    return t+1+(em[mon]?1:0);
  },0);
  const diversBlocs=activeDivers.filter(d=>!isSnorkel(d)).length;
  const proBlocs=(s.proGroups||[]).reduce((t,pg)=>t+((pg.plongeurs||[]).length||(pg.plongeur1?1:0)+(pg.plongeur2?1:0)),0);
  return diversBlocs+monBlocs+proBlocs;
}

          div({style:{fontSize:11,color:"#5a8a9a",fontWeight:700,marginBottom:8,fontFamily:"'Space Mono',monospace",textTransform:"uppercase",letterSpacing:1}},"📅 Historique sorties ("+showDiverProfile.historyDates.length+")"),
          div({style:{display:"flex",flexWrap:"wrap",gap:5}},
            ...[...showDiverProfile.historyDates].reverse().map(d=>span({key:d,style:{fontSize:11,padding:"3px 9px",background:"rgba(0,120,180,.1)",borderRadius:20,color:"#005588",fontFamily:"'Space Mono',monospace"}},new Date(d+"T12:00:00").toLocaleDateString("fr",{day:"numeric",month:"short",year:"2-digit"})))
          )
        ):null,
        div({style:{display:"flex",flexDirection:"column",gap:10,marginBottom:20}},
          ...[
            {icon:"🏅",label:"Certification",val:showDiverProfile.certification},
            {icon:"🤿",label:"Nb plongées",val:showDiverProfile.nbPlongees},
            {icon:"📅",label:"Dernière plongée",val:showDiverProfile.dernierePlongee?new Date(showDiverProfile.dernierePlongee).toLocaleDateString("fr",{day:"numeric",month:"long",year:"numeric"}):"—"},
            {icon:"🥽",label:"Stab",val:showDiverProfile.stabPerso?"Matériel perso":showDiverProfile.stab},
            {icon:"🤿",label:"Combi",val:showDiverProfile.combiPerso?"Matériel perso":showDiverProfile.combi||"—"},
            {icon:"🦶",label:"Palmes",val:showDiverProfile.palmePerso?"Matériel perso":showDiverProfile.palmes||"—"},
            {icon:"😷",label:"Masque",val:showDiverProfile.masquePerso?"Matériel perso":"À fournir"},
            {icon:"🚗",label:"Transport",val:showDiverProfile.vehicule?`Véhiculé${showDiverProfile.rdvPoint?" → RDV: "+showDiverProfile.rdvPoint:""}` :(showDiverProfile.residence||"—")},
            {icon:"📱",label:"Contact via",val:showDiverProfile.contactSource||"—"},
            {icon:"💳",label:"Paiement habituel",val:showDiverProfile.paiement},
            {icon:"📝",label:"Note",val:showDiverProfile.note||"—"},
          ].filter(r=>r.val&&r.val!=="—").map(row=>div({key:row.label,style:{display:"flex",alignItems:"flex-start",gap:12,padding:"10px 13px",background:"rgba(255,255,255,.7)",borderRadius:12,border:"1px solid rgba(0,120,180,.09)"}},
            span({style:{fontSize:18,flexShrink:0}},row.icon),
            div(null,
              div({style:{fontSize:11,color:"#5a8a9a",fontWeight:600,marginBottom:2}},row.label),
              div({style:{fontSize:15,fontWeight:600,color:"#1a2a3a"}},row.val)
            )
          ))
        ),
        btn({className:"btn-c",style:{width:"100%",padding:"15px",fontSize:16,borderRadius:14,marginBottom:10},onClick:()=>{
          if(selDay&&selSlot){
            setForm({...EMPTY_DIVER,...showDiverProfile,id:undefined,montantPaye:"",montantNet:"",notePaiement:"",carteUsed:""});
            setEditId(null);setShowDiverProfile(null);setShowForm(true);
          } else {
            alert("Sélectionne d'abord une sortie (onglet Jour + créneau) pour inscrire ce plongeur");
          }
        }},"✅ Inscrire dans la sortie sélectionnée"),
        btn({onClick:async()=>{if(window.confirm("Supprimer "+showDiverProfile.prenom+" "+showDiverProfile.nom+" de l'historique ?")){await db.collection("divers").doc(showDiverProfile.id).delete();setShowDiverProfile(null);}},style:{width:"100%",padding:"12px",fontSize:14,borderRadius:13,border:"1.5px solid rgba(200,50,50,.2)",background:"rgba(200,50,50,.05)",color:"#cc3333",cursor:"pointer",fontFamily:"'Outfit',sans-serif",fontWeight:600}},"🗑️ Supprimer de l'historique")
      )
    ):null
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));

</script>
</body>
</html>
