<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <meta name="theme-color" content="#f5ead8"/>
  <title>Dive N'Smile – Bora-Bora</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f5ead8;font-family:'Outfit',sans-serif;color:#1a2a3a;max-width:480px;margin:0 auto;min-height:100vh;font-size:17px}
    ::-webkit-scrollbar{display:none}
    input,select{outline:none;-webkit-appearance:none;font-size:16px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .fu{animation:fadeUp .28s ease}
    .btn-c{background:linear-gradient(135deg,#0088bb,#006699);color:#fff;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-weight:700;cursor:pointer;font-size:16px}
    .btn-g{background:rgba(255,255,255,.78);color:#1a5a7a;border:1.5px solid rgba(0,120,180,.2);border-radius:10px;font-family:'Outfit',sans-serif;font-weight:600;cursor:pointer;font-size:14px}
    .inp{width:100%;background:rgba(255,255,255,.88);border:1.5px solid rgba(0,120,180,.22);border-radius:12px;padding:13px 15px;color:#1a2a3a;font-family:'Outfit',sans-serif;font-size:16px}
    .inp::placeholder{color:#9ab5c0}
    select.inp option{background:#fdf6ec;color:#1a2a3a}
    .sl{font-size:11px;color:#5a8a9a;font-weight:700;text-transform:uppercase;letter-spacing:2px;font-family:'Space Mono',monospace;margin-bottom:7px}
    .card{background:rgba(255,255,255,.85);border:1px solid rgba(0,120,180,.15);border-radius:18px;box-shadow:0 2px 8px rgba(0,80,120,.08)}
    .dr{display:flex;align-items:center;padding:12px 13px;background:rgba(255,255,255,.78);border:1.5px solid rgba(0,120,180,.1);border-radius:14px;gap:11px;cursor:pointer}
    .tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;font-family:'Space Mono',monospace}
    .chk{width:22px;height:22px;border-radius:6px;border:2px solid rgba(0,150,200,.3);background:rgba(255,255,255,.88);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    @media print{body{background:#fff!important;max-width:100%!important}.no-print{display:none!important}}
  </style>
</head>
<body>
<div id="root"></div>
<script>
const LOGO_SRC="https://divensmilebora.com/wp-content/uploads/2025/08/logo.jpg";
const firebaseConfig={apiKey:"AIzaSyAkwx0vdnHXt0V7S5au4nVLudwVEmC_8_M",authDomain:"dive-n-smile.firebaseapp.com",projectId:"dive-n-smile",storageBucket:"dive-n-smile.firebasestorage.app",messagingSenderId:"663554708006",appId:"1:663554708006:web:9dfdcda13d1f4fecd5cce7"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
</script>
<script>
// Test that React works without Babel
const e = React.createElement;
const {useState, useEffect} = React;

function TestApp() {
  const [count, setCount] = useState(0);
  return e('div', {style:{padding:20,textAlign:'center'}},
    e('img', {src:LOGO_SRC, style:{width:80,height:80,borderRadius:'50%',marginBottom:10}}),
    e('h1', {style:{fontSize:24,color:'#0077aa'}}, "Dive N' Smile"),
    e('p', {style:{color:'#5a8a9a',marginTop:5}}, "Bora-Bora 🌺"),
    e('p', {style:{marginTop:20,color:'#1a7a4a',fontWeight:700}}, "✅ Application chargée !"),
    e('button', {
      onClick:()=>setCount(c=>c+1),
      className:'btn-c',
      style:{marginTop:20,padding:'12px 24px'}
    }, `Test: ${count} clics`)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(TestApp));
</script>
</body>
</html>
