function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function getWeekDays(offset=0){
  const now=new Date(),mon=new Date(now);
  mon.setDate(now.getDate()-((now.getDay()+6)%7)+offset*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function dKey(d){
  if(!(d instanceof Date))return d;
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function todayK(){

}
function fmtDate(d){return `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;}

function getDaysInRange(dateDebut,dateFin){
  const days=[];
  const d=new Date(dateDebut);
  const end=new Date(dateFin);
  while(d<=end){days.push(new Date(d));d.setDate(d.getDate()+1);}
  return days;
}

// ── DATA HELPERS ──────────────────────────────────────────────────────────────
function getSlot(day,sid,planning){
  const def=DIVE_SLOTS.find(s=>s.id===sid);
  return planning[dKey(day)]?.[sid]||{site:DIVE_SITES[0],monitor:MONITORS[0],divers:[],proGroups:[],extraMonitors:{},time:def?.defaultTime||"07:00",dp:"Patrick",annule:false,raisonAnnulation:"",params:{...EMPTY_SLOT_PARAMS}};
}

const SNORKEL_PRESTATIONS=["Sortie Snorkeling","Accompagnant (gratuit)"];
function isSnorkel(d){return SNORKEL_PRESTATIONS.some(p=>d.prestation&&d.prestation.includes(p.split("(")[0].trim()));}
function countBottles(day,sid,planning){
  const s=getSlot(day,sid,planning);
  if(!s.divers.length&&!(s.proGroups||[]).length)return 0;
  const em=s.extraMonitors||{};
  const activeDivers=s.divers.filter(d=>!d.annule);
  const monBlocs=MONITORS.reduce((t,mon)=>{
    const monDivers=activeDivers.filter(d=>d.moniteur===mon);
    if(!monDivers.length)return t;
    // Si tous les plongeurs du moniteur sont snorkel, pas de bloc moniteur
    const hasRealDiver=monDivers.some(d=>!isSnorkel(d));
    if(!hasRealDiver)return t;
    return t+1+(em[mon]?1:0);
  },0);
  const diversBlocs=activeDivers.filter(d=>!isSnorkel(d)).length;
  const proBlocs=(s.proGroups||[]).reduce((t,pg)=>t+((pg.plongeurs||[]).length||(pg.plongeur1?1:0)+(pg.plongeur2?1:0)),0);
  return diversBlocs+monBlocs+proBlocs;
}

  const [exportDateDebut,setExportDateDebut]=useState("");

  const saveGroupPay=async()=>{
    if(!showGroupPay||groupPaySelected.length===0)return;
    const slot=gSlot(showGroupPay.day,showGroupPay.sid);
    const payeur=groupPaySelected[0];
    const payeurDiver=slot.divers.find(x=>x.id===payeur);
    const newDivers=slot.divers.map(d=>{
      if(d.id===payeur){return {...d,montantNet:groupPayMontant,notePaiement:"Paiement groupé (payeur)"};}
      if(groupPaySelected.includes(d.id)&&d.id!==payeur){return {...d,montantNet:"0",notePaiement:"Payé avec "+(payeurDiver?.prenom||"")+" "+(payeurDiver?.nom||"")};}
      return d;
    });
    await updateSlot(showGroupPay.day,showGroupPay.sid,{...slot,divers:newDivers});
    setShowGroupPay(null);setGroupPaySelected([]);setGroupPayMontant("");
  };
  const resetGroupPay=async()=>{
    if(!showGroupPay)return;
    const slot=gSlot(showGroupPay.day,showGroupPay.sid);
    const grp=slot.divers.filter(d=>d.moniteur===showGroupPay.mon&&!d.annule);
    const newDivers=slot.divers.map(d=>{
      if(grp.find(g=>g.id===d.id)){return {...d,montantNet:"",notePaiement:""};}
      return d;
    });
    await updateSlot(showGroupPay.day,showGroupPay.sid,{...slot,divers:newDivers});
    setGroupPaySelected([]);setGroupPayMontant("");
  };
